version: '3.8'

services:
  app:
    build: .
    container_name: cinema-booking
    ports:
      - "8080:8080"
    environment:
      - MYSQL_PUBLIC_URL=mysql://root:rootpassword@mysql:3306/cinema_db
      - REDIS_PUBLIC_URL=redis://redis:6379
      - TMDB_API_KEY=${TMDB_API_KEY}
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - JPA_DDL_AUTO=update
      - JPA_SHOW_SQL=false
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cinema-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: cinema-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=cinema_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cinema-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cinema-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cinema-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

networks:
  cinema-network:
    driver: bridge
