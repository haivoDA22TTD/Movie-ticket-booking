spring:
  application:
    name: movie-booking-system
  
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  port: ${SERVER_PORT:8080}

tmdb:
  api:
    key: ${TMDB_API_KEY:eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJmMzQ4YzVjZDkxYjY1YmQ1Yzc2YThkNzIxYmU2YWU5MSIsIm5iZiI6MTc2NDkyOTc2My4yNTUsInN1YiI6IjY5MzJiMGUzNDZlMjA2NzYzMTAyZDkwNyIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.1oRFy0ZJ4jZ9rROFtlwdIAz257vtoH2mUzfRL2awoCU}
    base-url: ${TMDB_BASE_URL:https://api.themoviedb.org/3}
    image-base-url: ${TMDB_IMAGE_BASE_URL:https://image.tmdb.org/t/p}

app:
  domain: ${APP_DOMAIN:localhost}
  qr:
    width: 300
    height: 300

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
