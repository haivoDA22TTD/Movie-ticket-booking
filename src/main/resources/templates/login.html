<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
    <main>
        <div class="min-h-screen flex items-center justify-center py-12 px-4">
            <div class="max-w-md w-full">
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-bold text-gray-900 mb-2">Đăng nhập</h1>
                    <p class="text-gray-600">Chào mừng bạn quay trở lại!</p>
                </div>
                
                <div class="bg-white rounded-lg shadow-lg p-8">
                    <div th:if="${param.registered}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
                        Đăng ký thành công! Vui lòng đăng nhập.
                    </div>
                    
                    <div th:if="${param.error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                        Email hoặc mật khẩu không đúng!
                    </div>
                    
                    <form th:action="@{/login}" method="post">
                        <div class="mb-4">
                            <label class="block text-gray-700 font-bold mb-2">Email</label>
                            <input type="email" name="username" required
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-red-500">
                        </div>
                        
                        <div class="mb-6">
                            <label class="block text-gray-700 font-bold mb-2">Mật khẩu</label>
                            <input type="password" name="password" required
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-red-500">
                        </div>
                        
                        <button type="submit" 
                                class="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 transition">
                            <i class="fas fa-sign-in-alt mr-2"></i>Đăng nhập
                        </button>
                    </form>
                    
                    <div class="mt-6 text-center">
                        <p class="text-gray-600">
                            Chưa có tài khoản? 
                            <a href="/register" class="text-red-600 font-bold hover:underline">Đăng ký ngay</a>
                        </p>
                    </div>
                    
                    <!-- Passkey Login -->
                    <div class="mt-6 pt-6 border-t">
                        <p class="text-center text-gray-600 mb-4">Hoặc đăng nhập bằng</p>
                        <button onclick="loginWithPasskey()" 
                                class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition flex items-center justify-center">
                            <i class="fas fa-fingerprint mr-2 text-xl"></i>Passkey
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <script>
            async function loginWithPasskey() {
                try {
                    if (!window.PublicKeyCredential) {
                        alert('Trình duyệt của bạn không hỗ trợ Passkey');
                        return;
                    }
                    
                    const email = prompt('Nhập email của bạn:');
                    if (!email) return;
                    
                    // Start authentication
                    const startResponse = await fetch('/passkey/authenticate/start?email=' + encodeURIComponent(email), {
                        method: 'POST'
                    });
                    
                    if (!startResponse.ok) {
                        const error = await startResponse.json();
                        alert('Lỗi: ' + (error.error || 'Không thể đăng nhập'));
                        return;
                    }
                    
                    const options = await startResponse.json();
                    
                    // Convert challenge to Uint8Array
                    options.challenge = base64ToArrayBuffer(options.challenge);
                    
                    // Convert allowCredentials
                    if (options.allowCredentials) {
                        options.allowCredentials = options.allowCredentials.map(cred => ({
                            ...cred,
                            id: base64ToArrayBuffer(cred.id)
                        }));
                    }
                    
                    // Get credential
                    const credential = await navigator.credentials.get({
                        publicKey: options
                    });
                    
                    // Finish authentication
                    const finishResponse = await fetch('/passkey/authenticate/finish', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            credentialId: arrayBufferToBase64(credential.rawId),
                            challenge: arrayBufferToBase64(options.challenge),
                            signature: arrayBufferToBase64(credential.response.signature),
                            authenticatorData: arrayBufferToBase64(credential.response.authenticatorData)
                        })
                    });
                    
                    const result = await finishResponse.json();
                    
                    if (result.status === 'success') {
                        window.location.href = result.redirect || '/';
                    } else {
                        alert('Lỗi: ' + result.message);
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Có lỗi xảy ra: ' + error.message);
                }
            }
            
            function base64ToArrayBuffer(base64) {
                const binaryString = atob(base64.replace(/-/g, '+').replace(/_/g, '/'));
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                return bytes.buffer;
            }
            
            function arrayBufferToBase64(buffer) {
                const bytes = new Uint8Array(buffer);
                let binary = '';
                for (let i = 0; i < bytes.byteLength; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
            }
        </script>
    </main>
</body>
</html>
