<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
    <section>
        <div class="container mx-auto px-4 py-12">
            <h1 class="text-3xl font-bold mb-8 text-center">Chọn ghế ngồi</h1>
            
            <!-- Movie Info -->
            <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
                <div class="flex items-center space-x-6">
                    <img th:src="'https://image.tmdb.org/t/p/w200' + ${showtime.movie.posterPath}" 
                         th:alt="${showtime.movie.title}"
                         class="w-32 rounded">
                    <div>
                        <h2 class="text-2xl font-bold mb-2" th:text="${showtime.movie.title}">Movie</h2>
                        <p class="text-gray-600">
                            <i class="fas fa-map-marker-alt mr-2"></i>
                            <span th:text="${showtime.screen.cinema.name}">Cinema</span> - 
                            <span th:text="${showtime.screen.name}">Screen</span>
                        </p>
                        <p class="text-gray-600">
                            <i class="fas fa-clock mr-2"></i>
                            <span th:text="${#temporals.format(showtime.startTime, 'HH:mm dd/MM/yyyy')}">Time</span>
                        </p>
                        <p class="text-2xl font-bold text-red-600 mt-2">
                            <span th:text="${#numbers.formatDecimal(showtime.price, 0, 'COMMA', 0, 'POINT')}">100000</span>đ/ghế
                        </p>
                    </div>
                </div>
            </div>
            
            <!-- Screen -->
            <div class="mb-8">
                <div class="bg-gray-800 text-white text-center py-3 rounded-t-3xl">
                    <i class="fas fa-tv mr-2"></i>MÀN HÌNH
                </div>
            </div>
            
            <!-- Seat Map -->
            <div class="bg-white rounded-lg shadow-lg p-8 mb-8">
                <div id="seat-map" class="flex flex-col items-center space-y-2">
                    <div th:each="row : ${#strings.listSplit('A,B,C,D,E,F,G,H', ',')}" 
                         class="flex items-center space-x-2">
                        <span class="w-8 text-center font-bold" th:text="${row}">A</span>
                        <div class="flex space-x-2">
                            <button th:each="num : ${#numbers.sequence(1, 12)}"
                                    th:data-seat-id="${row + num}"
                                    th:classappend="${#lists.contains(bookedSeats, seat.id)} ? 'seat-booked' : 'seat-available'"
                                    class="seat w-10 h-10 rounded border-2 transition hover:scale-110"
                                    onclick="toggleSeat(this)">
                                <span th:text="${num}">1</span>
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Legend -->
                <div class="flex justify-center space-x-8 mt-8">
                    <div class="flex items-center">
                        <div class="w-8 h-8 bg-gray-300 border-2 border-gray-400 rounded mr-2"></div>
                        <span>Trống</span>
                    </div>
                    <div class="flex items-center">
                        <div class="w-8 h-8 bg-red-500 border-2 border-red-600 rounded mr-2"></div>
                        <span>Đã chọn</span>
                    </div>
                    <div class="flex items-center">
                        <div class="w-8 h-8 bg-gray-500 border-2 border-gray-600 rounded mr-2"></div>
                        <span>Đã đặt</span>
                    </div>
                </div>
            </div>
            
            <!-- Booking Summary -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h3 class="text-xl font-bold mb-2">Ghế đã chọn</h3>
                        <p id="selected-seats" class="text-gray-600">Chưa chọn ghế</p>
                    </div>
                    <div class="text-right">
                        <p class="text-gray-600 mb-2">Tổng tiền</p>
                        <p id="total-price" class="text-3xl font-bold text-red-600">0đ</p>
                    </div>
                </div>
                <form th:action="@{/booking/create}" method="post" id="booking-form">
                    <input type="hidden" name="showtimeId" th:value="${showtime.id}">
                    <input type="hidden" name="seatIds" id="seat-ids">
                    <button type="submit" 
                            class="w-full bg-red-600 text-white py-4 rounded-lg text-xl font-bold hover:bg-red-700 transition disabled:bg-gray-400"
                            id="submit-btn" disabled>
                        <i class="fas fa-arrow-right mr-2"></i>Tiếp tục
                    </button>
                </form>
            </div>
        </div>
        
        <script th:inline="javascript">
            const seatPrice = /*[[${showtime.price}]]*/ 100000;
            const bookedSeats = /*[[${bookedSeats}]]*/ [];
            let selectedSeats = [];
            
            function toggleSeat(button) {
                if (button.classList.contains('seat-booked')) return;
                
                const seatId = button.dataset.seatId;
                
                if (button.classList.contains('seat-selected')) {
                    button.classList.remove('seat-selected', 'bg-red-500', 'border-red-600', 'text-white');
                    button.classList.add('seat-available', 'bg-gray-300', 'border-gray-400');
                    selectedSeats = selectedSeats.filter(s => s !== seatId);
                } else {
                    button.classList.remove('seat-available', 'bg-gray-300', 'border-gray-400');
                    button.classList.add('seat-selected', 'bg-red-500', 'border-red-600', 'text-white');
                    selectedSeats.push(seatId);
                }
                
                updateSummary();
            }
            
            function updateSummary() {
                const selectedSeatsText = selectedSeats.length > 0 
                    ? selectedSeats.join(', ') 
                    : 'Chưa chọn ghế';
                document.getElementById('selected-seats').textContent = selectedSeatsText;
                
                const total = selectedSeats.length * seatPrice;
                document.getElementById('total-price').textContent = 
                    total.toLocaleString('vi-VN') + 'đ';
                
                document.getElementById('seat-ids').value = selectedSeats.join(',');
                document.getElementById('submit-btn').disabled = selectedSeats.length === 0;
            }
            
            // Initialize booked seats
            document.querySelectorAll('.seat').forEach(seat => {
                seat.classList.add('seat-available', 'bg-gray-300', 'border-gray-400');
            });
        </script>
    </section>
</body>
</html>
