<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
    <main>
        <div class="min-h-screen flex items-center justify-center py-12 px-4">
            <div class="max-w-md w-full">
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-bold text-gray-900 mb-2">Đăng ký</h1>
                    <p class="text-gray-600">Tạo tài khoản mới</p>
                </div>
                
                <div class="bg-white rounded-lg shadow-lg p-8">
                    <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                        <span th:text="${error}">Error message</span>
                    </div>
                    
                    <form th:action="@{/register}" method="post">
                        <div class="mb-4">
                            <label class="block text-gray-700 font-bold mb-2">Họ và tên</label>
                            <input type="text" name="fullName" required
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-red-500">
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 font-bold mb-2">Email</label>
                            <input type="email" name="email" required
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-red-500">
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 font-bold mb-2">Số điện thoại</label>
                            <input type="tel" name="phone" required
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-red-500">
                        </div>
                        
                        <div class="mb-6">
                            <label class="block text-gray-700 font-bold mb-2">Mật khẩu</label>
                            <input type="password" name="password" required minlength="6"
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-red-500">
                        </div>
                        
                        <button type="submit" 
                                class="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 transition">
                            <i class="fas fa-user-plus mr-2"></i>Đăng ký
                        </button>
                    </form>
                    
                    <div class="mt-6 text-center">
                        <p class="text-gray-600">
                            Đã có tài khoản? 
                            <a href="/login" class="text-red-600 font-bold hover:underline">Đăng nhập</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
