<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<body>
    <section>
        <div class="container mx-auto px-4 py-12">
            <h1 class="text-3xl font-bold mb-8">
                <i class="fas fa-tachometer-alt text-red-500 mr-3"></i>Admin Dashboard
            </h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-600">Rạp chiếu</p>
                            <p class="text-3xl font-bold" th:text="${cinemaCount}">0</p>
                        </div>
                        <i class="fas fa-building text-4xl text-blue-500"></i>
                    </div>
                    <a href="/admin/cinemas" class="text-blue-600 hover:underline mt-4 block">Quản lý →</a>
                </div>
                
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-600">Phòng chiếu</p>
                            <p class="text-3xl font-bold" th:text="${screenCount}">0</p>
                        </div>
                        <i class="fas fa-door-open text-4xl text-green-500"></i>
                    </div>
                    <a href="/admin/screens" class="text-green-600 hover:underline mt-4 block">Quản lý →</a>
                </div>
                
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-600">Lịch chiếu</p>
                            <p class="text-3xl font-bold" th:text="${showtimeCount}">0</p>
                        </div>
                        <i class="fas fa-calendar text-4xl text-red-500"></i>
                    </div>
                    <a href="/admin/showtimes" class="text-red-600 hover:underline mt-4 block">Quản lý →</a>
                </div>
            </div>
            
            <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-6">
                <h3 class="font-bold text-lg mb-2">
                    <i class="fas fa-info-circle text-yellow-600 mr-2"></i>Hướng dẫn
                </h3>
                <ol class="list-decimal list-inside space-y-2 text-gray-700">
                    <li>Tạo rạp chiếu (Cinemas)</li>
                    <li>Tạo phòng chiếu cho từng rạp (Screens)</li>
                    <li>Tạo lịch chiếu cho phim (Showtimes)</li>
                </ol>
            </div>
        </div>
    </section>
</body>
</html>
