spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
  
  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  thymeleaf:
    cache: true

logging:
  level:
    root: INFO
    com.cinema: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
